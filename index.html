<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Aracely 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
overflow-x:hidden;
padding:30px;
}

.container{
width:90%;
max-width:800px;
background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 40px rgba(255,105,180,0.25);
position:relative;
}

h1{
color:#ff4f87;
margin-bottom:20px;
font-size:2rem;
}

p{
font-size:1.15rem;
line-height:1.9;
margin-bottom:25px;
color:#555;
white-space:pre-line;
}

button{
padding:15px 25px;
border:none;
border-radius:999px;
cursor:pointer;
font-size:1rem;
margin:10px;
transition:0.3s;
}

.yes{
background:#ff5d9e;
color:white;
}

.yes:hover{
transform:scale(1.08);
}

.no{
background:white;
border:2px solid #ff5d9e;
color:#ff5d9e;
position:absolute;
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
pointer-events:none;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:35px;
}

.gallery img{
width:240px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.note{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 18px;
border-radius:20px;
font-size:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
color:#ff4f87;
animation:fadeIn 0.4s;
z-index:999;
}

.note img{
width:120px;
border-radius:15px;
margin-top:10px;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateX(-50%) scale(0.8);
}

to{
opacity:1;
transform:translateX(-50%) scale(1);
}

}

</style>
</head>

<body>

<div class="container">

<div id="content">

<h1>🎂 Feliz cumpleaños 💖</h1>

<p>
A la persona más especial del planeta tierra ✨
</p>

<button class="yes" onclick="nextStep()">
Continuar ✨
</button>

</div>

</div>

<script>

const steps = [

{
title:"🔐 Verificación requerida",
text:"Antes de continuar necesitamos verificar tu identidad... 👀✨",
yes:"Iniciar verificación 💖"
},

{
title:"💖 Pregunta 1",
text:"¿Eres la persona más linda del planeta? 🌎✨",
yes:"Sí 💕",
no:"No 😒"
},

{
title:"🌸 Pregunta 2",
text:"¿Eres la persona más amable del universo? ✨",
yes:"Sí 💖",
no:"No ❌"
},

{
title:"🦋 Pregunta 3",
text:"¿Eres una chica valiente que puede con todo? 🌷",
yes:"Sí 😌",
no:"No 😭"
},

{
title:"🌟 Pregunta 4",
text:"¿Mereces todo lo bonito de este mundo? 💫",
yes:"Sí 💕",
no:"No 🙄"
},

{
title:"👑 Verificación completada",
text:`✅ Identidad confirmada.
Eres...
Aracely Reyes
✨ The Best Of The Best ✨`,
special:true
},

{
title:"💌 Mensaje para ti",
text:`Feliz cumpleaños a la persona más especial del planeta tierra 🎂💖

Se que no lo digo lo suficiente, pero gracias bro. Gracias por ser como eres. Tu personalidad es oro puro y de verdad admiro muchísimo la forma en la que enfrentas las cosas. He aprendido mucho de ti, de tu valentía, de tu manera de seguir adelante incluso cuando las cosas no salen bien, y cada día demuestras más lo increíble y especial que eres.

Sé que este último tiempo han cambiado muchas cosas y aunque no siempre sepa cómo demostrarlo, quiero que sepas que desde que me fui no hay un momento que no piense que necesito mejorar mentalmente para ser una mejor amiga para ti. Porque no te mereces menos o cosas a medias.

También sé que han habido momentos difíciles para ti, y quizá no estuve tan presente como debía. Me disculpo por eso y por ser tan ciega de ver solo mis problemas y no estar presente para los tuyos.

Así que hoy quiero agradecerte y recordarte lo bacan que eres y desearte lo mejor para tu vida, espero que Dios te de muchos años de vida, con mucha salud, y una nueva rodilla.

Espero que este nuevo año te traiga momentos tan bacanes como tú 💖

Feliz cumpleaños Cousin 🎂`,
final:true
}

];

let current = 0;

function nextStep(){

const step = steps[current];
current++;

const content = document.getElementById("content");

if(step.special){

content.innerHTML = `
<h1>${step.title}</h1>

<p>${step.text}</p>

<button class="yes" onclick="nextStep()">
Ver mensaje 💌
</button>
`;

return;
}

if(step.final){

content.innerHTML = `
<h1>${step.title}</h1>

<p>${step.text}</p>

<div class="gallery">

<img src="FOTO1.jpg" style="transform:rotate(-3deg);">

<img src="FOTO2.jpg" style="transform:rotate(3deg);">

</div>
`;

createHearts();

return;
}

if(step.no){

content.innerHTML = `
<h1>${step.title}</h1>

<p>${step.text}</p>

<div style="position:relative;height:220px;">

<button class="yes" onclick="nextStep()">
${step.yes}
</button>

<button class="no" id="noBtn">
${step.no}
</button>

</div>
`;

moveButton();

}else{

content.innerHTML = `
<h1>${step.title}</h1>

<p>${step.text}</p>

<button class="yes" onclick="nextStep()">
${step.yes}
</button>
`;
}

}

function moveButton(){

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{

showMonkey();

const x = Math.random()*300;
const y = Math.random()*150;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

});

}

function showMonkey(){

const note = document.createElement("div");

note.classList.add("note");

note.innerHTML = `
¿En serio ibas a apretar no? 🤨

<br><br>

<img src="https://i.imgur.com/8Q1Z7F8.jpeg">
`;

document.body.appendChild(note);

setTimeout(()=>{
note.remove();
},3000);

}

function createHearts(){

setInterval(()=>{

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "💖";

heart.style.left = Math.random()*100 + "vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

}

</script>

</body>
</html>
